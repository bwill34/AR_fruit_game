<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Vocabulary AR Game</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Mali', cursive;
            touch-action: none; /* ป้องกัน Pull-to-refresh บนมือถือ */
            overflow: hidden;
            background-color: #bae6fd; /* bg-sky-200 */
        }

        /* สไตล์เยลลี่ 3D และ Animation */
        .jelly-btn {
            border-radius: 30px;
            border: 4px solid white;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .jelly-btn:active, .jelly-btn.simulated-active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2);
        }

        @keyframes shake-wrong {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px) rotate(-5deg); }
            40%, 80% { transform: translateX(15px) rotate(5deg); }
        }
        .anim-shake { animation: shake-wrong 0.4s ease-in-out; }

        @keyframes pop-correct {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .anim-pop { animation: pop-correct 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes float-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .anim-bounce { animation: float-bounce 2s infinite ease-in-out; }

        /* Confetti */
        .confetti {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            transition: top 3s linear, transform 3s linear;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body class="w-screen h-screen relative select-none">

    <video id="video-input" class="hidden" autoplay playsinline></video>
    <canvas id="bg-canvas" class="absolute top-0 left-0 w-full h-full z-0 object-cover"></canvas>

    <div id="ar-cursor" class="fixed w-20 h-20 pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center opacity-0 transition-opacity duration-300">
        <span class="text-5xl drop-shadow-lg">✨</span>
        <svg class="absolute inset-0 w-full h-full" style="transform: rotate(-90deg);">
            <circle cx="40" cy="40" r="36" stroke="#ec4899" stroke-width="6" fill="none" stroke-linecap="round"
                    stroke-dasharray="226" stroke-dashoffset="226" id="hover-ring" />
        </svg>
    </div>

    <div class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none">
        
        <div id="screen-loading" class="flex flex-col items-center pointer-events-auto bg-white/80 p-8 rounded-[30px] border-4 border-white shadow-xl max-w-[90%]">
            <div class="text-6xl mb-4 anim-bounce">🤖</div>
            <h1 class="text-3xl md:text-4xl font-bold text-sky-600 text-center mb-2">กำลังเตรียมระบบ AI...</h1>
            <p class="text-xl text-gray-600 text-center">กรุณากดยอมรับการใช้กล้อง (Allow Camera) เพื่อเริ่มเล่น</p>
        </div>

        <div id="screen-start" class="hidden flex-col items-center pointer-events-auto max-w-[90%]">
            <h1 class="text-5xl md:text-7xl font-bold text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)] mb-8 text-center bg-gradient-to-r from-pink-400 via-purple-400 to-sky-400 p-6 rounded-[30px] border-4 border-white">
                Fruit Vocabulary<br><span class="text-4xl text-yellow-200">เกมคำศัพท์ผลไม้ AR</span>
            </h1>
            <button id="btn-start" class="hand-interact jelly-btn bg-yellow-400 text-white font-bold text-4xl px-12 py-6">
                เริ่มเล่นเลย! 🎮
            </button>
        </div>

        <div id="screen-game" class="hidden w-full h-full flex-col max-h-[100vh]">
            <div class="flex justify-between items-center w-full p-6 pt-8">
                <div class="bg-white/90 border-4 border-white rounded-full px-6 py-2 shadow-md text-2xl font-bold text-sky-600">
                    ข้อที่: <span id="text-progress">1/5</span>
                </div>
                <div class="bg-white/90 border-4 border-white rounded-full px-6 py-2 shadow-md text-2xl font-bold text-pink-600">
                    คะแนน: <span id="text-score">0</span>
                </div>
            </div>

            <div class="flex-1 flex justify-between items-center w-full px-4 md:px-16 pb-12 relative">
                
                <button id="btn-opt-left" class="hand-interact pointer-events-auto jelly-btn bg-pink-400 text-white font-bold text-3xl md:text-5xl py-4 px-6 md:px-10 max-w-[35%] break-words z-20">
                    Option 1
                </button>

                <div id="fruit-target" class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 text-[120px] md:text-[200px] drop-shadow-[0_15px_15px_rgba(0,0,0,0.4)] anim-bounce z-10 pointer-events-none">
                    🍎
                </div>

                <button id="btn-opt-right" class="hand-interact pointer-events-auto jelly-btn bg-sky-400 text-white font-bold text-3xl md:text-5xl py-4 px-6 md:px-10 max-w-[35%] break-words z-20">
                    Option 2
                </button>

            </div>
        </div>

        <div id="screen-result" class="hidden flex-col items-center pointer-events-auto bg-white/90 p-8 md:p-12 rounded-[40px] border-4 border-white shadow-xl max-w-[90%]">
            <h2 class="text-5xl font-bold text-purple-500 mb-6 text-center">จบเกมแล้ว! 🎉</h2>
            <div class="text-3xl text-gray-700 mb-8 text-center font-semibold">
                หนูทำได้ <span id="final-score" class="text-6xl text-pink-500 font-bold mx-2">0</span> คะแนน
            </div>
            <button id="btn-restart" class="hand-interact jelly-btn bg-green-400 text-white font-bold text-3xl px-10 py-5">
                เล่นอีกครั้ง 🔄
            </button>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. Data Source & State
        // ==========================================
        const fruitPool = [
            { name: 'Apple', icon: '🍎' }, { name: 'Banana', icon: '🍌' }, { name: 'Orange', icon: '🍊' },
            { name: 'Grape', icon: '🍇' }, { name: 'Strawberry', icon: '🍓' }, { name: 'Watermelon', icon: '🍉' },
            { name: 'Pineapple', icon: '🍍' }, { name: 'Mango', icon: '🥭' }, { name: 'Cherry', icon: '🍒' },
            { name: 'Peach', icon: '🍑' }, { name: 'Pear', icon: '🍐' }, { name: 'Kiwi', icon: '🥝' },
            { name: 'Lemon', icon: '🍋' }, { name: 'Coconut', icon: '🥥' },
            { name: 'Avocado', icon: '🥑' }, { name: 'Melon', icon: '🍈' }, { name: 'Green Apple', icon: '🍏' },
            { name: 'Tomato', icon: '🍅' }, { name: 'Papaya', icon: '🥭' },
            { name: 'Plum', icon: '🍑' }, { name: 'Pomegranate', icon: '🍎' }, { name: 'Lychee', icon: '🍒' },
            { name: 'Raspberry', icon: '🍇' }, { name: 'Dragon Fruit', icon: '🐲' }, { name: 'Starfruit', icon: '⭐' },
            { name: 'Guava', icon: '🍐' }, { name: 'Tangerine', icon: '🍊' } 
        ];

        let currentRoundQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isProcessingAnswer = false; // ป้องกันการกดซ้ำซ้อน

        // ==========================================
        // 2. Audio Engine (Tone.js) Wrapper
        // ==========================================
        let isAudioInit = false;
        const synths = {};

        function initAudio() {
            if (isAudioInit) return;
            try {
                synths.poly = new Tone.PolySynth(Tone.Synth).toDestination();
                synths.mem = new Tone.MembraneSynth().toDestination();
                synths.simple = new Tone.Synth().toDestination();
                Tone.context.resume();
                isAudioInit = true;
            } catch (e) { console.error("Audio Init Error", e); }
        }

        function safePlay(playFn) {
            try {
                if (isAudioInit && Tone.context.state === 'running') playFn();
            } catch (e) { console.warn("Sound blocked", e); }
        }

        const SoundManager = {
            hover: () => safePlay(() => synths.simple.triggerAttackRelease("C6", "32n", undefined, 0.05)),
            click: () => safePlay(() => synths.mem.triggerAttackRelease("C4", "16n")),
            correct: () => safePlay(() => synths.poly.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n")),
            wrong: () => safePlay(() => {
                synths.simple.triggerAttackRelease("C3", "8n");
                setTimeout(() => safePlay(() => synths.simple.triggerAttackRelease("G2", "4n")), 150);
            }),
            win: () => safePlay(() => {
                const now = Tone.now();
                synths.poly.triggerAttackRelease(["C5", "E5", "G5"], "8n", now);
                synths.poly.triggerAttackRelease(["D5", "F5", "A5"], "8n", now + 0.2);
                synths.poly.triggerAttackRelease(["E5", "G5", "B5"], "8n", now + 0.4);
                synths.poly.triggerAttackRelease(["C5", "E5", "G5", "C6"], "2n", now + 0.6);
            })
        };

        // ==========================================
        // 3. Game Flow & UI Controllers
        // ==========================================
        const screens = {
            loading: document.getElementById('screen-loading'),
            start: document.getElementById('screen-start'),
            game: document.getElementById('screen-game'),
            result: document.getElementById('screen-result')
        };

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            Object.values(screens).forEach(s => s.classList.remove('flex'));
            screens[screenName].classList.remove('hidden');
            screens[screenName].classList.add('flex');
        }

        function generateRound() {
            // สุ่มคำถาม 5 ข้อ แบบไม่ซ้ำ
            const shuffled = [...fruitPool].sort(() => 0.5 - Math.random());
            currentRoundQuestions = shuffled.slice(0, 5).map(fruit => {
                // สร้างตัวเลือกผิด 1 ตัว
                let wrongOpts = fruitPool.filter(f => f.name !== fruit.name);
                let wrongChoice = wrongOpts[Math.floor(Math.random() * wrongOpts.length)];
                
                // สุ่มตำแหน่งซ้ายขวา
                let options = [fruit, wrongChoice].sort(() => 0.5 - Math.random());
                return { 
                    answer: fruit, 
                    options: options,
                    correctIndex: options.indexOf(fruit)
                };
            });
            currentQuestionIndex = 0;
            score = 0;
        }

        function renderQuestion() {
            isProcessingAnswer = false;
            document.getElementById('text-progress').innerText = `${currentQuestionIndex + 1}/5`;
            document.getElementById('text-score').innerText = score;

            const q = currentRoundQuestions[currentQuestionIndex];
            const fruitEl = document.getElementById('fruit-target');
            const btnLeft = document.getElementById('btn-opt-left');
            const btnRight = document.getElementById('btn-opt-right');

            // Reset Styles
            fruitEl.className = 'absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 text-[120px] md:text-[200px] drop-shadow-[0_15px_15px_rgba(0,0,0,0.4)] anim-bounce z-10 pointer-events-none';
            btnLeft.className = 'hand-interact pointer-events-auto jelly-btn bg-pink-400 text-white font-bold text-3xl md:text-5xl py-4 px-6 md:px-10 max-w-[35%] break-words z-20';
            btnRight.className = 'hand-interact pointer-events-auto jelly-btn bg-purple-400 text-white font-bold text-3xl md:text-5xl py-4 px-6 md:px-10 max-w-[35%] break-words z-20';
            
            // Set Content
            fruitEl.innerText = q.answer.icon;
            btnLeft.innerText = q.options[0].name;
            btnRight.innerText = q.options[1].name;

            // Update Dataset for validation
            btnLeft.dataset.isCorrect = (q.correctIndex === 0).toString();
            btnRight.dataset.isCorrect = (q.correctIndex === 1).toString();
        }

        function spawnStars(x, y) {
            for(let i=0; i<8; i++) {
                let star = document.createElement('div');
                star.innerText = '✨';
                star.style.position = 'absolute';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                star.style.fontSize = '30px';
                star.style.pointerEvents = 'none';
                star.style.transition = 'all 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
                star.style.zIndex = '100';
                document.body.appendChild(star);

                setTimeout(() => {
                    const angle = (Math.PI * 2 / 8) * i;
                    const dist = 120;
                    star.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`;
                    star.style.opacity = '0';
                }, 10);

                setTimeout(() => star.remove(), 510);
            }
        }

        function createConfetti() {
            const emojis = ['⭐', '🎉', '🎈', '🍬', '✨', '🍎', '🍌'];
            for(let i=0; i<60; i++) {
                let div = document.createElement('div');
                div.className = 'confetti';
                div.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = -10 + 'vh';
                div.style.fontSize = (Math.random() * 20 + 20) + 'px';
                document.body.appendChild(div);

                setTimeout(() => {
                    div.style.top = '110vh';
                    div.style.transform = `rotate(${Math.random()*720 - 360}deg)`;
                }, 50);

                setTimeout(() => div.remove(), 3050);
            }
        }

        function handleAnswer(btn) {
            if (isProcessingAnswer) return;
            isProcessingAnswer = true;
            SoundManager.click();

            const isCorrect = btn.dataset.isCorrect === 'true';
            const rect = btn.getBoundingClientRect();

            if (isCorrect) {
                btn.classList.add('anim-pop');
                btn.classList.replace('bg-pink-400', 'bg-green-400');
                btn.classList.replace('bg-purple-400', 'bg-green-400');
                SoundManager.correct();
                spawnStars(rect.left + rect.width/2, rect.top + rect.height/2);
                score += 10;
            } else {
                btn.classList.add('anim-shake');
                btn.classList.replace('bg-pink-400', 'bg-red-500');
                btn.classList.replace('bg-purple-400', 'bg-red-500');
                SoundManager.wrong();
            }

            document.getElementById('text-score').innerText = score;

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < 5) {
                    renderQuestion();
                } else {
                    document.getElementById('final-score').innerText = score;
                    switchScreen('result');
                    SoundManager.win();
                    createConfetti();
                }
            }, 1200);
        }

        // ==========================================
        // 4. Input Wiring & Hover-to-Click Engine
        // ==========================================
        document.getElementById('btn-start').addEventListener('click', async () => {
            initAudio();
            SoundManager.click();
            generateRound();
            switchScreen('game');
            renderQuestion();
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            SoundManager.click();
            generateRound();
            switchScreen('game');
            renderQuestion();
        });

        ['btn-opt-left', 'btn-opt-right'].forEach(id => {
            document.getElementById(id).addEventListener('click', function() {
                handleAnswer(this);
            });
        });

        // AR Interaction Variables
        let hoverTarget = null;
        let hoverStartTime = 0;
        const HOVER_DURATION = 1200; // 1.2s hover to click
        const hoverRing = document.getElementById('hover-ring');
        const RING_MAX_DASH = 226; // From CSS

        function processHoverLogic(cursorX, cursorY) {
            // Find intersect with interactive elements
            const buttons = document.querySelectorAll('.hand-interact:not(.hidden)');
            let foundTarget = null;
            
            // Only check visible buttons in active container
            const activeScreen = Array.from(document.querySelectorAll('div[id^="screen-"]')).find(el => !el.classList.contains('hidden'));
            
            if (activeScreen) {
                const activeButtons = activeScreen.querySelectorAll('.hand-interact');
                for (let btn of activeButtons) {
                    const rect = btn.getBoundingClientRect();
                    // บัฟเฟอร์พื้นที่นิดหน่อยเพื่อให้กดง่ายขึ้นสำหรับเด็ก
                    const padding = 20; 
                    if (cursorX >= rect.left - padding && cursorX <= rect.right + padding &&
                        cursorY >= rect.top - padding && cursorY <= rect.bottom + padding) {
                        foundTarget = btn;
                        break;
                    }
                }
            }

            if (foundTarget && !isProcessingAnswer) {
                if (hoverTarget !== foundTarget) {
                    hoverTarget = foundTarget;
                    hoverStartTime = Date.now();
                    foundTarget.classList.add('simulated-active');
                    SoundManager.hover();
                } else {
                    const elapsed = Date.now() - hoverStartTime;
                    const progress = Math.min(elapsed / HOVER_DURATION, 1);
                    
                    // อัพเดตวงแหวนโหลด (ลด offset ลง)
                    hoverRing.style.strokeDashoffset = RING_MAX_DASH - (progress * RING_MAX_DASH);

                    if (progress >= 1) {
                        // Trigger Click
                        foundTarget.click();
                        foundTarget.classList.remove('simulated-active');
                        hoverTarget = null;
                        hoverRing.style.strokeDashoffset = RING_MAX_DASH;
                    }
                }
            } else {
                if (hoverTarget) {
                    hoverTarget.classList.remove('simulated-active');
                }
                hoverTarget = null;
                hoverRing.style.strokeDashoffset = RING_MAX_DASH;
            }
        }

        // ==========================================
        // 5. MediaPipe AR Setup & Canvas Drawing
        // ==========================================
        const videoElement = document.getElementById('video-input');
        const canvasElement = document.getElementById('bg-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const arCursor = document.getElementById('ar-cursor');

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            // Draw Mirrored Background
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // สลับแกน X เพื่อ Mirror กล้อง
            canvasCtx.scale(-1, 1);
            canvasCtx.translate(-canvasElement.width, 0);
            
            if (results.image) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            }

            // Draw Hand Skeleton Overlay
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // วาดเส้นกระดูกมือ
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#ec4899', lineWidth: 2, radius: 4});
                
                canvasCtx.restore(); // คืนค่าแกนก่อนคำนวณตำแหน่ง Cursor

                // Get Landmark 8 (Index Finger)
                const indexFinger = landmarks[8];
                
                // Map to screen (ต้องสลับแกน X คืนด้วย 1 - x เพราะกล้อง Mirror)
                const cursorX = (1 - indexFinger.x) * window.innerWidth;
                const cursorY = indexFinger.y * window.innerHeight;

                // Update Cursor position
                arCursor.style.left = `${cursorX}px`;
                arCursor.style.top = `${cursorY}px`;
                arCursor.style.opacity = '1';

                // Process Interaction logic
                processHoverLogic(cursorX, cursorY);
            } else {
                canvasCtx.restore();
                arCursor.style.opacity = '0';
                processHoverLogic(-1000, -1000); // รีเซ็ต Hover
            }

            // เมื่อกล้องโหลดสำเร็จ เปลี่ยนไปหน้า Start
            if (screens.loading.classList.contains('flex') && results.image) {
                switchScreen('start');
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        // Start Camera
        camera.start().catch(err => {
            document.querySelector('#screen-loading p').innerText = "เกิดข้อผิดพลาด: ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบการอนุญาตใช้งาน (Permissions)";
            console.error("Camera Error:", err);
        });

    </script>
</body>
</html>
